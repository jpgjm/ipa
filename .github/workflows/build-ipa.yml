name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete Flutter project (generate ios/ scaffold)
        run: flutter create --platforms=ios --project-name hello_world --org com.example .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (dummy folder trick)
        run: |
          mkdir -p dummy
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/dummy/hello_world.ipa" Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-ipa
          path: dummy/
